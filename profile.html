<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - HelpHub AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-page: #f5f0e6;
            --dark-header: #282c2d;
            --accent-teal: #18a08b;
            --card-radius: 40px;
        }

        body {
            background-color: var(--bg-page);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #2d3436;
        }

        /* Top Header Banner */
        .profile-banner {
            background-color: var(--dark-header);
            color: white;
            border-radius: var(--card-radius);
            padding: 3.5rem 3rem;
            margin-bottom: 2rem;
        }

        .profile-banner .label {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            font-weight: 800;
            opacity: 0.6;
            display: block;
            margin-bottom: 0.5rem;
        }

        /* Card Containers */
        .profile-card {
            background: #fff;
            border: none;
            border-radius: var(--card-radius);
            padding: 3rem;
            height: 100%;
        }

        .section-label {
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--accent-teal);
            margin-bottom: 1.5rem;
            display: block;
        }

        /* Custom Badges */
        .badge-skill {
            background-color: #eef5f3;
            color: #4a7c6d;
            border: 1px solid #d8e6e2;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .badge-rep {
            background-color: #eef5f3;
            color: #4a7c6d;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        /* Form Styling */
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 0.4rem;
        }

        .form-control {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1px solid #eee;
            background-color: #fff;
            margin-bottom: 1.2rem;
        }

        .btn-save {
            background-color: var(--accent-teal);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 0.8rem;
            font-weight: 700;
            width: 100%;
            margin-top: 1rem;
        }

        /* Stats Row */
        .stat-line {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 1rem;
        }

        .stat-name {
            color: #666;
            font-size: 0.95rem;
        }

        .stat-value {
            font-weight: 700;
        }

        .header {
            width: 100%;
        }

        /* Header */
        .container-header {
            background: #eae7df;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Logo */
        .logo {
            display: flex;
            margin-left: 60px;
            cursor: pointer;
            align-items: center;
            gap: 10px;

        }

        .logo-box {
            background: #1f9d8a;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Nav */
        .nav {
            display: flex;
            gap: 25px;
        }

        .nav a {
            text-decoration: none;
            color: #555;
            font-weight: 500;
            padding: 8px 15px;
            border-radius: 20px;
        }

        .nav a.active {
            background: #cfd8d3;
            color: #1f9d8a;
        }

        /* Right side */
        .right {
            display: flex;
            align-items: center;
            gap: 15px;
        }



        /* Live community signals (left button) */
        .signal-btn {
            border: none;
            background: #f1efea;
            padding: 10px 20px;
            border-radius: 999px;
            color: #6b6b6b;
            font-size: 16px;
            cursor: pointer;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        /* Join the platform (right button) */
        .join-btn {
            border: none;
            background: linear-gradient(135deg, #1fa38a, #0d7c6c);
            color: white;
            margin-right: 90px;
            padding: 12px 26px;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;

            /* THIS is the key part */
            box-shadow:
                0 8px 20px rgba(31, 163, 138, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        /* Hover effect (important for premium feel) */
        .join-btn:hover {
            transform: translateY(-1px);
            box-shadow:
                0 10px 25px rgba(31, 163, 138, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .signal-btn:hover {
            background: #e7e5df;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="container-header">

            <!-- Logo -->
            <div class="logo">
                <div class="logo-box">H</div>
                <h2>HelpHub AI</h2>
            </div>

            <!-- Nav Links -->
            <nav class="nav">
                <a href="./dashboard.html">Dashboard</a>
                <a href="./onboarding.html">Onboarding</a>
                <a href="./profile.html" class="active">Profile</a>

            </nav>



        </div>
    </header>
    <div class="container py-5">

        <div class="profile-banner">
            <span class="label">Profile</span>
            <h1 class="display-3 fw-bold mb-1">Ayesha Khan</h1>
            <p class="mb-0 opacity-75">Both • Karachi</p>
        </div>

        <div class="row g-4">

            <div class="col-lg-7">
                <div class="profile-card">
                    <span class="section-label">Public Profile</span>
                    <h2 class="fw-bold mb-4">Skills and reputation</h2>

                    <div class="stat-line">
                        <span class="stat-name">Trust score</span>
                        <span class="stat-value">92%</span>
                    </div>
                    <div class="stat-line mb-4">
                        <span class="stat-name">Contributions</span>
                        <span class="stat-value">31</span>
                    </div>

                    <h6 class="fw-bold mb-3">Skills</h6>
                    <div class="mb-4">
                        <span class="badge-skill">Figma</span>
                        <span class="badge-skill">UI/UX</span>
                        <span class="badge-skill">HTML/CSS</span>
                        <span class="badge-skill">Career Guidance</span>
                    </div>

                    <h6 class="fw-bold mb-3">Badges</h6>
                    <div>
                        <span class="badge-rep">Design Ally</span>
                        <span class="badge-rep">Fast Responder</span>
                        <span class="badge-rep">Top Mentor</span>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="profile-card">
                    <span class="section-label">Edit Profile</span>
                    <h2 class="fw-bold mb-4">Update your identity</h2>

                    <form>
                        <div class="row">
                            <div class="col-md-6">
                                <label class="form-label">Name</label>
                                <input type="text" class="form-control" value="Ayesha Khan">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Location</label>
                                <input type="text" class="form-control" value="Karachi">
                            </div>
                        </div>

                        <label class="form-label">Skills</label>
                        <input type="text" class="form-control" value="Figma, UI/UX, HTML/CSS, Career Guidance">

                        <label class="form-label">Interests</label>
                        <input type="text" class="form-control" value="Hackathons, UI/UX, Community Building">

                        <button type="submit" class="btn btn-save">Save profile</button>
                    </form>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
